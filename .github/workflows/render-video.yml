name: Render Video

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download TTS audio artifacts
        run: |
          rm -f public/audio/timing.json
          gh run download 27498851296 -n tts-audio-complete -D public/audio --repo shrynexnetwork/openclaw-video
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Render video
        run: npx remotion render src/index.ts Video out/video.mp4 --codec=h264 --crf=23 --x264-preset=veryfast --concurrency=4 --enforce-audio-track

      - name: Upload video artifact
        uses: actions/upload-artifact@v4
        with:
          name: final-video
          path: out/video.mp4
          retention-days: 90
