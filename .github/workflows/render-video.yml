name: Render Video

on:
  workflow_run:
    workflows: ["Generate TTS Audio"]
    types:
      - completed

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Download TTS audio artifacts
        uses: actions/download-artifact@v4
        with:
          name: tts-audio-complete
          run-id: ${{ github.event.workflow_run.id }}
          path: public/audio/

      - name: Verify audio files
        run: ls -la public/audio/ | head -20

      - name: Render video
        run: npx remotion render src/index.ts Video out/video.mp4 --codec=h264 --crf=23 --x264-preset=veryfast --enforce-audio-track

      - name: Upload video artifact
        uses: actions/upload-artifact@v4
        with:
          name: final-video
          path: out/video.mp4
          retention-days: 90
